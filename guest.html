<!doctype html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Sales-only door: prospects get this link directly; keep it out of search. -->
<meta name="robots" content="noindex, nofollow">
<title>Guest Preview — Saudi Opportunity Hub</title>

<!-- ════════════════════════════════════════════════════════════════
     GUEST ENTRY PAGE
     One-button, zero-credential door into the demo for sales
     prospects. Pressing the button sets the sessionStorage flag that
     assets/auth-bootstrap.js (index.html) recognises as a guest
     session — no Supabase call happens on this page and nothing is
     written anywhere. Data restriction is server-side: guests run as
     the anon role and can only read the column-restricted
     public.opportunities_guest view (see supabase/migrations/
     2026_06_11_guest_mode_restricted_read.sql).

     If a real member opens this page and presses the button anyway,
     auth-bootstrap sees their live session, clears the stale guest
     flag, and they land in their normal account — so this page never
     needs auth logic of its own.
════════════════════════════════════════════════════════════════ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* Gold ramp + dark surfaces match tokens.css / the app's dark-glass
     language (kept inline so this page is a single self-contained file). */
  :root {
    --gold:        #C9A66B;
    --gold-bright: #e3bd6c;
    --gold-hover:  #d4ab48;
    --ink-on-gold: #1f1700;
    --text:        rgba(255, 255, 255, 0.92);
    --text-muted:  rgba(255, 255, 255, 0.62);
    --text-faint:  rgba(255, 255, 255, 0.45);
    --hairline:    rgba(255, 255, 255, 0.18);
    --font-body:   'Inter', system-ui, sans-serif;
    --font-display:'Space Grotesk', 'Inter', system-ui, sans-serif;
    --font-arabic: 'IBM Plex Sans Arabic', 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }
  body {
    font-family: var(--font-body);
    color: var(--text);
    background: #0b0e13;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }
  [dir="rtl"] body { font-family: var(--font-arabic); }

  /* ── Background: same login loop, dimmed under a navy scrim ── */
  .bg-video, .bg-still {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
  }
  .bg-still { display: none; }
  .bg-scrim {
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(ellipse at 50% 110%, rgba(201, 166, 107, 0.10), transparent 55%),
      linear-gradient(180deg, rgba(8, 11, 16, 0.78), rgba(8, 11, 16, 0.86));
  }
  @media (prefers-reduced-motion: reduce) {
    .bg-video { display: none; }
    .bg-still { display: block; }
  }

  /* ── Language toggle (same affordance as login.html) ── */
  .lang-toggle {
    position: fixed;
    top: 18px;
    inset-inline-end: 20px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 13px;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.06);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    font-family: var(--font-body);
    cursor: pointer;
    -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
    transition: background .15s, border-color .15s;
  }
  .lang-toggle:hover { background: rgba(255, 255, 255, 0.12); border-color: rgba(255, 255, 255, 0.3); }
  [dir="rtl"] .lang-toggle { font-family: var(--font-arabic); }

  /* ── Card: canonical dark-glass recipe (rgba .08 base + 135° gradient
        + 1px rgba .18 border + blur 60 saturate 180 + inset highlight) ── */
  .guest-card {
    width: min(440px, 100%);
    padding: 44px 38px 34px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.05));
    border: 1px solid var(--hairline);
    -webkit-backdrop-filter: blur(60px) saturate(180%);
            backdrop-filter: blur(60px) saturate(180%);
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.12);
    text-align: center;
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 26px;
    color: var(--gold-bright);
  }
  .brand svg { width: 30px; height: 30px; }
  .brand-name {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.2px;
    color: var(--text);
  }
  [dir="rtl"] .brand-name { font-family: var(--font-arabic); }
  .brand-sub {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--gold-bright);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  [dir="rtl"] .brand-sub { letter-spacing: 0; }
  .brand-text { text-align: start; }

  h1 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  [dir="rtl"] h1 { font-family: var(--font-arabic); letter-spacing: 0; }
  .sub {
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  /* The one action on the page — big, gold, unmissable. */
  .btn-enter {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px 18px;
    border: none;
    border-radius: 12px;
    background: var(--gold-bright);
    color: var(--ink-on-gold);
    font-family: var(--font-body);
    font-size: 15.5px;
    font-weight: 700;
    letter-spacing: 0.1px;
    cursor: pointer;
    transition: background .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 6px 22px rgba(227, 189, 108, 0.28);
  }
  .btn-enter:hover { background: var(--gold-hover); box-shadow: 0 8px 26px rgba(227, 189, 108, 0.38); }
  .btn-enter:active { transform: translateY(1px); }
  .btn-enter:focus-visible { outline: 2px solid #fff; outline-offset: 3px; }
  [dir="rtl"] .btn-enter { font-family: var(--font-arabic); }

  .no-creds {
    margin-top: 14px;
    font-size: 12px;
    color: var(--text-faint);
  }

  .member-row {
    margin-top: 26px;
    padding-top: 18px;
    border-top: 1px solid rgba(255, 255, 255, 0.10);
    font-size: 12.5px;
    color: var(--text-faint);
  }
  .member-row a { color: var(--gold-bright); text-decoration: none; font-weight: 500; }
  .member-row a:hover { text-decoration: underline; }

  /* ── Click → brief loading veil, then into the app ── */
  .loading-veil {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(8, 11, 16, 0.82);
    -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
    opacity: 0;
    visibility: hidden;
    transition: opacity .25s ease;
  }
  .loading-veil.on { opacity: 1; visibility: visible; }
  .spinner {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 3px solid rgba(227, 189, 108, 0.25);
    border-top-color: var(--gold-bright);
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-label { font-size: 13.5px; color: var(--text-muted); }

  @media (max-width: 480px) {
    .guest-card { padding: 36px 24px 28px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- Background — short login loop (~370KB), still frame as poster +
     reduced-motion fallback. -->
<video class="bg-video" autoplay muted loop playsinline poster="assets/bg-login-still.webp" aria-hidden="true">
  <source src="assets/bg-login-loop-short.webm" type="video/webm">
  <source src="assets/bg-login-loop-short.mp4" type="video/mp4">
</video>
<img class="bg-still" src="assets/bg-login-still.webp" alt="" aria-hidden="true">
<div class="bg-scrim" aria-hidden="true"></div>

<button class="lang-toggle" id="lang-toggle" type="button" aria-label="Switch language">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
  </svg>
  <span id="lang-toggle-label">العربية</span>
</button>

<main class="guest-card" role="main">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="9.5" opacity="0.32"/>
      <line x1="12" y1="3.5" x2="12" y2="8"/><line x1="20.5" y1="12" x2="16" y2="12"/>
      <line x1="12" y1="20.5" x2="12" y2="16"/><line x1="3.5" y1="12" x2="8" y2="12"/>
      <circle cx="12" cy="3.5" r="1.6" fill="currentColor"/><circle cx="20.5" cy="12" r="1.6" fill="currentColor"/>
      <circle cx="12" cy="20.5" r="1.6" fill="currentColor"/><circle cx="3.5" cy="12" r="1.6" fill="currentColor"/>
      <circle cx="12" cy="12" r="3.2" fill="currentColor" stroke="none"/>
    </svg>
    <div class="brand-text">
      <span class="brand-name" data-en="Saudi Opportunity Hub" data-ar="منصة الفرص السعودية">Saudi Opportunity Hub</span>
      <span class="brand-sub" data-en="Guest preview" data-ar="معاينة كضيف">Guest preview</span>
    </div>
  </div>

  <h1 data-en="Evaluate the full platform." data-ar="قيّم المنصة كاملة.">Evaluate the full platform.</h1>
  <p class="sub"
     data-en="Browse 4,000+ verified Vision 2030 funding opportunities — live counts, analytics, every sector, full search."
     data-ar="تصفح أكثر من 4,000 فرصة تمويل موثقة لرؤية 2030 — أرقام حية، تحليلات، جميع القطاعات، وبحث كامل.">
    Browse 4,000+ verified Vision 2030 funding opportunities — live counts, analytics, every sector, full search.
  </p>

  <button class="btn-enter" id="guest-enter" type="button">
    <span data-en="Continue as Guest →" data-ar="المتابعة كضيف">Continue as Guest →</span>
  </button>
  <p class="no-creds"
     data-en="No email. No password. One click — member-only details stay locked."
     data-ar="بدون بريد إلكتروني. بدون كلمة مرور. نقرة واحدة — تفاصيل الأعضاء تبقى مقفلة.">
    No email. No password. One click — member-only details stay locked.
  </p>

  <div class="member-row">
    <span data-en="Already a member?" data-ar="عضو بالفعل؟">Already a member?</span>
    <a href="login.html" data-en="Sign in" data-ar="تسجيل الدخول">Sign in</a>
  </div>
</main>

<div class="loading-veil" id="loading-veil" aria-hidden="true">
  <div class="spinner" aria-hidden="true"></div>
  <div class="loading-label" id="loading-label">Loading guest preview…</div>
</div>

<script>
(function () {
  'use strict';

  /* ── Language: reuse the login page's persisted choice so the pair
        of public pages always agree. ── */
  var LANG_KEY = 'oh-login-lang';
  var lang = 'en';
  try { lang = localStorage.getItem(LANG_KEY) === 'ar' ? 'ar' : 'en'; } catch (e) {}

  var toggleLabel = document.getElementById('lang-toggle-label');

  function applyLang(next) {
    lang = next;
    try { localStorage.setItem(LANG_KEY, lang); } catch (e) {}
    var isAr = lang === 'ar';
    document.documentElement.setAttribute('dir',  isAr ? 'rtl' : 'ltr');
    document.documentElement.setAttribute('lang', isAr ? 'ar'  : 'en');
    document.querySelectorAll('[data-en][data-ar]').forEach(function (el) {
      el.textContent = isAr ? el.dataset.ar : el.dataset.en;
    });
    toggleLabel.textContent = isAr ? 'English' : 'العربية';
    document.title = isAr ? 'معاينة كضيف — منصة الفرص السعودية' : 'Guest Preview — Saudi Opportunity Hub';
  }

  document.getElementById('lang-toggle').addEventListener('click', function () {
    applyLang(lang === 'ar' ? 'en' : 'ar');
  });
  if (lang === 'ar') applyLang('ar');

  /* ── The one action: flag the session as guest and enter the app.
        No network, no credentials, no writes — auth-bootstrap.js does
        the rest (and a real logged-in session would simply override
        the flag). ── */
  document.getElementById('guest-enter').addEventListener('click', function () {
    try { sessionStorage.setItem('oh_guest', '1'); } catch (e) {}
    var veil = document.getElementById('loading-veil');
    document.getElementById('loading-label').textContent =
      lang === 'ar' ? 'جارٍ تحميل المعاينة…' : 'Loading guest preview…';
    veil.classList.add('on');
    veil.setAttribute('aria-hidden', 'false');
    setTimeout(function () { window.location.href = 'index.html'; }, 450);
  });
})();
</script>
</body>
</html>
