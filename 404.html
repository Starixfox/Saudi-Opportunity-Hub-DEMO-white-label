<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; base-uri 'self';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Page not found — Saudi Opportunity Hub</title>
  <meta name="description" content="The page you were looking for could not be found in the Saudi Opportunity Hub.">
  <meta name="theme-color" content="#006C35">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%23006C35'/><path d='M32 14a18 18 0 1 0 18 18 18 18 0 0 0-18-18zm0 6a12 12 0 1 1-12 12 12 12 0 0 1 12-12z' fill='%23fdf8f2'/><circle cx='32' cy='32' r='4' fill='%23C9A66B'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- ─── Polish pass: consolidated design tokens + foundation styles ─── -->
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/polish-overrides.css">
  <style>
    :root {
      --green: #006C35;
      --green-hover: #005229;
      --gold: #C9A66B;
      --bg: #fdf8f2;
      --surface: #ffffff;
      --border: #e2ddd5;
      --text: #1a1a1a;
      --text-muted: #6b6560;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.55;
    }
    .wrap {
      max-width: 560px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,.06);
    }
    .badge {
      display: inline-block;
      font: 700 12px/1 'Inter', system-ui, sans-serif;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--green);
      background: #e8f5ed;
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    h1 {
      font: 700 clamp(2rem, 2vw + 1.5rem, 3rem)/1.1 'Space Grotesk', 'Inter', sans-serif;
      margin-bottom: 14px;
      letter-spacing: -0.01em;
    }
    p { color: var(--text-muted); margin-bottom: 26px; }
    .code {
      font: 700 6rem/1 'Space Grotesk', 'Inter', monospace;
      color: var(--green);
      letter-spacing: -0.04em;
      margin-bottom: 4px;
    }
    .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 20px;
      border-radius: 10px;
      font: 600 14px/1 'Inter', system-ui, sans-serif;
      text-decoration: none;
      transition: background .15s, transform .15s;
    }
    a.btn--primary { background: var(--green); color: #fff; }
    a.btn--primary:hover { background: var(--green-hover); }
    a.btn--ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    a.btn--ghost:hover { background: #f3efe7; }
    a.btn:active { transform: translateY(1px); }
    .accent { color: var(--gold); }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f1419; --surface: #1a1f25; --border: #2a3138; --text: #e6e6e6; --text-muted: #9ca3af; }
      .badge { background: rgba(0, 108, 53, .15); }
      a.btn--ghost:hover { background: rgba(255,255,255,.04); }
    }
  </style>
</head>
<body>
  <main class="wrap" role="main">
    <span class="badge">Saudi Opportunity Hub</span>
    <div class="code">4<span class="accent">0</span>4</div>
    <h1>Page not found</h1>
    <p>We couldn't find that page. Head back to the dashboard, or sign in to search every open grant and tender.</p>
    <div class="actions">
      <a class="btn btn--primary" href="/index.html">Go to dashboard</a>
      <a class="btn btn--ghost" href="/login.html">Sign in</a>
    </div>
  </main>
</body>
</html>
