<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; base-uri 'self';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Page not found — Saudi Opportunity Hub</title>
  <meta name="description" content="The page you were looking for could not be found in the Saudi Opportunity Hub.">
  <meta name="theme-color" content="#C9A66B">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%23006C35'/><path d='M32 14a18 18 0 1 0 18 18 18 18 0 0 0-18-18zm0 6a12 12 0 1 1-12 12 12 12 0 0 1 12-12z' fill='%23fdf8f2'/><circle cx='32' cy='32' r='4' fill='%23C9A66B'/></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Shared design system: tokens → foundation → components (404 has no
       polish-overrides dependency, so the order is simpler here). -->
  <link rel="stylesheet" href="assets/tokens.css">
  <link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/components.css">

  <style>
    /* 404-page-local — the rest comes from components.css */
    .nf-card { width: 100%; max-width: 520px; text-align: center; }

    .nf-eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-gold-500);
      margin-bottom: 18px;
    }
    [dir="rtl"] .nf-eyebrow { letter-spacing: 0; text-transform: none; font-family: var(--font-arabic); }

    .nf-code {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(5rem, 14vw, 7rem);
      line-height: 1;
      letter-spacing: -0.04em;
      color: #ffffff;
      margin-bottom: 14px;
      font-variant-numeric: tabular-nums;
    }
    .nf-code .nf-accent { color: var(--color-gold-500); }

    .nf-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(1.5rem, 1.0rem + 1.6vw, 2.125rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: #ffffff;
      margin-bottom: 12px;
    }
    [dir="rtl"] .nf-title { font-family: var(--font-arabic); letter-spacing: 0; }

    .nf-sub {
      font-size: 14.5px;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.6;
      max-width: 42ch;
      margin: 0 auto 28px;
    }
    [dir="rtl"] .nf-sub { font-family: var(--font-arabic); }

    .nf-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body class="oh-atmospheric">

<!-- ══ TOPBAR — OH brand + language toggle ══ -->
<header class="oh-topbar">
  <a href="login.html" class="oh-brand">
    <span class="oh-brand-mark">OH</span>
    <span class="oh-brand-text">
      <span class="oh-brand-name" data-en="Opportunity Hub" data-ar="منصة الفرص">Opportunity Hub</span>
      <span class="oh-brand-sub" data-en="Saudi Vision 2030" data-ar="رؤية السعودية 2030">Saudi Vision 2030</span>
    </span>
  </a>
  <button class="oh-lang-toggle" id="lang-toggle" type="button" aria-label="Switch language">
    <svg class="oh-lang-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
    <span id="lang-label">العربية</span>
  </button>
</header>

<!-- ══ MAIN ══ -->
<main class="oh-page-center" role="main">
  <div class="oh-glass-card nf-card">
    <span class="nf-eyebrow" data-en="Saudi Opportunity Hub" data-ar="منصة الفرص السعودية">Saudi Opportunity Hub</span>
    <div class="nf-code" aria-hidden="true">4<span class="nf-accent">0</span>4</div>
    <h1 class="nf-title" data-en="Page not found" data-ar="الصفحة غير موجودة">Page not found</h1>
    <p class="nf-sub" data-en="We couldn't find that page. Head back to the dashboard, or sign in to search every open grant and tender." data-ar="لم نتمكن من العثور على هذه الصفحة. عد إلى لوحة التحكم، أو سجل الدخول للبحث في كل منحة ومناقصة مفتوحة.">We couldn't find that page. Head back to the dashboard, or sign in to search every open grant and tender.</p>
    <div class="nf-actions">
      <a class="oh-btn oh-btn--primary" href="index.html">
        <span data-en="Go to dashboard" data-ar="الذهاب إلى لوحة التحكم">Go to dashboard</span>
      </a>
      <a class="oh-btn oh-btn--ghost" href="login.html">
        <span data-en="Sign in" data-ar="تسجيل الدخول">Sign in</span>
      </a>
    </div>
  </div>
</main>

<script>
(function () {
  /* Language toggle — same contract as login / contact: persisted under
     'oh-login-lang', flips dir, lang, and swaps data-en/data-ar text. */
  var stored = localStorage.getItem('oh-login-lang') || 'en';

  function applyLang(lang) {
    var isAr = lang === 'ar';
    document.documentElement.setAttribute('dir',  isAr ? 'rtl' : 'ltr');
    document.documentElement.setAttribute('lang', isAr ? 'ar'  : 'en');
    document.getElementById('lang-label').textContent = isAr ? 'English' : 'العربية';
    document.querySelectorAll('[data-en][data-ar]').forEach(function (el) {
      el.textContent = isAr ? el.dataset.ar : el.dataset.en;
    });
    localStorage.setItem('oh-login-lang', lang);
  }

  document.getElementById('lang-toggle').addEventListener('click', function () {
    var cur = document.documentElement.getAttribute('dir') === 'rtl' ? 'ar' : 'en';
    applyLang(cur === 'en' ? 'ar' : 'en');
  });

  if (stored === 'ar') applyLang('ar');
})();
</script>

</body>
</html>
