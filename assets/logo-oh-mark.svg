<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Opportunity Hub">
  <!-- Outer ring — represents the "hub" outer boundary -->
  <circle cx="12" cy="12" r="9.5" opacity="0.32"/>

  <!-- Four cardinal spokes -->
  <line x1="12" y1="3.5" x2="12" y2="8"/>
  <line x1="20.5" y1="12" x2="16" y2="12"/>
  <line x1="12" y1="20.5" x2="12" y2="16"/>
  <line x1="3.5" y1="12" x2="8" y2="12"/>

  <!-- Four cardinal connection nodes -->
  <circle cx="12" cy="3.5" r="1.6" fill="currentColor"/>
  <circle cx="20.5" cy="12" r="1.6" fill="currentColor"/>
  <circle cx="12" cy="20.5" r="1.6" fill="currentColor"/>
  <circle cx="3.5" cy="12" r="1.6" fill="currentColor"/>

  <!-- Central hub core — heavier so it reads as the anchor -->
  <circle cx="12" cy="12" r="3.2" fill="currentColor" stroke="none"/>
</svg>
