name: Bug report
description: Something on the site isn't behaving the way it should.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Before filing, please confirm this isn't already
        captured in [polish/AUDIT.md](../blob/main/polish/AUDIT.md) or in an
        existing issue.

        If this is a **security** issue, do NOT file it here — email
        jblancoapodaca@gmail.com per [SECURITY.md](../blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Plain-language description.
      placeholder: When I click the X button on the Opportunities listing, the panel doesn't open and the page scrolls to the top instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Sign in to the live site
        2. Switch to the Opportunities tab
        3. Apply the "Energy" sector filter
        4. Click the first card
        5. See the panel doesn't open
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Page / view affected
      placeholder: "/index.html#opportunities · login.html · contact.html · etc."

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Edge
        - Firefox
        - Safari
        - Mobile Safari
        - Mobile Chrome
        - Other
    validations:
      required: true

  - type: input
    id: theme
    attributes:
      label: Active white-label theme (if relevant)
      placeholder: "default · misa · monshaat · adio · neom · sdb · swift-solve"

  - type: textarea
    id: console
    attributes:
      label: Browser console errors (if any)
      description: Paste the relevant lines from DevTools → Console.
      render: text
