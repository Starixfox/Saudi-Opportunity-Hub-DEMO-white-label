name: Weekly opportunity digest

# Runs every Monday at 08:00 UTC (≈09:00 Europe/Amsterdam winter, 10:00 summer)
# and can also be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      min_candidates:
        description: 'Minimum candidates to aim for (default 10)'
        required: false
        default: '10'
      max_candidates:
        description: 'Cap on candidates returned (default 20)'
        required: false
        default: '20'

permissions:
  contents: write
  pull-requests: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: '.github/scripts/requirements.txt'

      - name: Install dependencies
        run: pip install --quiet -r .github/scripts/requirements.txt

      - name: Run research
        id: research
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          BRIGHTDATA_API_TOKEN:     ${{ secrets.BRIGHTDATA_API_TOKEN }}
          BRIGHTDATA_SERP_ZONE:     ${{ secrets.BRIGHTDATA_SERP_ZONE }}
          BRIGHTDATA_UNLOCKER_ZONE: ${{ secrets.BRIGHTDATA_UNLOCKER_ZONE }}
          MIN_CANDIDATES:           ${{ inputs.min_candidates || '10' }}
          MAX_CANDIDATES:           ${{ inputs.max_candidates || '20' }}
        run: python .github/scripts/research_opportunities.py

      - name: Create branch + draft PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="digest/${DATE}"

          git config user.name  "Saudi Hub Digest Bot"
          git config user.email "saudi-hub-bot@users.noreply.github.com"

          # If no digest file was produced, nothing to commit — surface why and stop.
          if [ ! -f "digests/${DATE}.md" ]; then
            echo "::warning::No digest produced for ${DATE} — skipping PR."
            exit 0
          fi

          git checkout -b "${BRANCH}"
          git add "digests/${DATE}.md"
          git commit -m "digest: weekly opportunity research — ${DATE}"
          git push origin "${BRANCH}"

          gh pr create \
            --draft \
            --title  "Weekly opportunity digest — ${DATE}" \
            --body   "$(cat <<EOF
Auto-generated weekly digest of newly-discovered Saudi/GCC funding opportunities.

**Review the digest:** \`digests/${DATE}.md\`

**What to do:**
1. Skim the JSON candidates and the rejection notes.
2. For each candidate you want to keep, run a manual \`INSERT INTO opportunities\` against the Supabase project, or paste the row into your normal ingestion flow.
3. **Close this PR without merging** when you're done — the digest is meant to be ephemeral. Or merge it if you want the digest to live in the repo for reference.

🤖 Generated by \`.github/workflows/weekly-opportunity-digest.yml\`
EOF
)"
