name: Link Checker
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Compute date
        id: date
        run: echo "today=$(date '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Extract URLs
        run: grep -oP 'https?://[^\s"<>]+' index.html | grep -v 'github\|fonts\|cdnjs\|jsdelivr\|unpkg\|fontshare\|googleapis' | sort -u > urls.txt

      - name: Check URLs
        run: |
          echo "## Link Check Report — ${{ steps.date.outputs.today }}" > report.md
          echo "" >> report.md
          broken=0
          while read url; do
            status=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 --location "$url" 2>/dev/null || echo "ERR")
            if [[ "$status" != 2* ]]; then
              echo "- ❌ \`$status\` — $url" >> report.md
              ((broken++)) || true
            fi
          done < urls.txt
          echo "" >> report.md
          echo "**Total broken: $broken**" >> report.md

      - name: Create GitHub Issue with results
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link Check Report — ${{ steps.date.outputs.today }}"
          content-filepath: report.md
          labels: link-check
